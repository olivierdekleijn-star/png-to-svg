<!DOCTYPE html>
<html>
<head>
    <title>PNG to SVG Converter</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding-top: 80px;
        }

        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            display: inline-block;
        }

        input {
            margin-top: 20px;
            padding: 10px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #22c55e;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 10px;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>PNG → SVG Converter</h1>
    <p>Upload een PNG en download een SVG</p>

    <input type="file" id="file">
    <br>
    <button onclick="upload()">Convert</button>
</div>

<script>
async function upload() {
    const file = document.getElementById("file").files[0];

    const formData = new FormData();
    formData.append("image", file);

    const res = await fetch("http://localhost:3000/convert", {
        method: "POST",
        body: formData
    });

    const svg = await res.text();

    const blob = new Blob([svg], { type: "image/svg+xml" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "converted.svg";
    a.click();
}
</script>

</body>
</html>
